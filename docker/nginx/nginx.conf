worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 关键点：CodexManager 依赖带下划线的自定义请求头维持会话锚点。
    # 如果不打开这两个开关，Nginx 会把 `conversation_id` / `session_id` 一类头当成无效头直接丢掉。
    underscores_in_headers on;
    ignore_invalid_headers off;

    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream codexmanager_service {
        server 127.0.0.1:48760;
        keepalive 32;
    }

    upstream codexmanager_web {
        server 127.0.0.1:48761;
        keepalive 16;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name manager.example.com web.example.com;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name manager.example.com;

        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        # 如果只想暴露 API 路径，可把根路径直接挡掉，减少公网扫描噪音。
        location = / {
            return 404;
        }

        location = /v1/responses/compact {
            # 中文注释：compact 是非流式 JSON，但实际执行时常常接近长连接场景。
            # 单独给它一条更保守的代理配置，减少响应体返回途中被代理层截断的概率。
            client_max_body_size 0;
            proxy_pass http://codexmanager_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header conversation_id $http_conversation_id;
            proxy_set_header session_id $http_session_id;
            proxy_set_header x-client-request-id $http_x_client_request_id;
            proxy_set_header x-openai-subagent $http_x_openai_subagent;
            proxy_set_header x-codex-beta-features $http_x_codex_beta_features;
            proxy_set_header x-codex-turn-metadata $http_x_codex_turn_metadata;
            proxy_set_header x-codex-turn-state $http_x_codex_turn_state;

            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            gzip off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            send_timeout 600s;
        }

        location ^~ /v1/images/ {
            # 中文注释：Images 兼容入口可能上传 multipart 图片，也可能返回较大的 base64 JSON。
            # 单独关闭请求/响应缓冲，并给更长超时，避免图片生成链路被代理层截断。
            client_max_body_size 0;
            proxy_pass http://codexmanager_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header conversation_id $http_conversation_id;
            proxy_set_header session_id $http_session_id;
            proxy_set_header x-client-request-id $http_x_client_request_id;
            proxy_set_header x-openai-subagent $http_x_openai_subagent;
            proxy_set_header x-codex-beta-features $http_x_codex_beta_features;
            proxy_set_header x-codex-turn-metadata $http_x_codex_turn_metadata;
            proxy_set_header x-codex-turn-state $http_x_codex_turn_state;

            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            gzip off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            send_timeout 3600s;
        }

        location / {
            # 中文注释：Responses 请求可能携带大上下文或内联文件，避免被 Nginx 的默认 body 限制拦截。
            client_max_body_size 0;
            proxy_pass http://codexmanager_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 关键点：显式转发所有与会话锚点和 turn state 相关的头。
            proxy_set_header conversation_id $http_conversation_id;
            proxy_set_header session_id $http_session_id;
            proxy_set_header x-client-request-id $http_x_client_request_id;
            proxy_set_header x-openai-subagent $http_x_openai_subagent;
            proxy_set_header x-codex-beta-features $http_x_codex_beta_features;
            proxy_set_header x-codex-turn-metadata $http_x_codex_turn_metadata;
            proxy_set_header x-codex-turn-state $http_x_codex_turn_state;

            # Responses / SSE / WebSocket 场景尽量避免代理层重新缓冲。
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name web.example.com;

        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        location / {
            proxy_pass http://codexmanager_web;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
